<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMIS - Sign In</title>
    <link href="https://cdn.syncfusion.com/blazor/27.1.48/styles/bootstrap5.css" rel="stylesheet" />
    <style>
        body { margin:0; background: linear-gradient(135deg,#1a237e 0%,#0d47a1 50%,#1565c0 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; }
        .login-card { background:#fff; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.3); width:100%; max-width:420px; overflow:hidden; }
        .login-header { background:linear-gradient(135deg,#1a237e,#1565c0); color:#fff; text-align:center; padding:40px 30px 30px; }
        .login-header h2 { margin:0 0 6px; font-size:28px; font-weight:700; letter-spacing:2px; }
        .login-header p { margin:0; font-size:13px; opacity:.85; }
        .login-body { padding:32px 30px; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; margin-bottom:6px; font-weight:600; font-size:13px; color:#444; }
        .form-group input { width:100%; box-sizing:border-box; }
        .error-message { background:#fff3f3; border:1px solid #f5c6cb; color:#c0392b; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
        .login-btn { width:100%; height:44px; font-size:15px; font-weight:600; border-radius:8px; margin-top:4px; cursor:pointer; }
        .login-footer { text-align:center; padding:16px; background:#f8f9fa; border-top:1px solid #eee; font-size:12px; color:#999; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>SMIS</h2>
            <p>Shop Management Information System</p>
        </div>
        <div class="login-body">
            <form method="post" action="/account/login">
                <input type="hidden" name="returnUrl" value="/" />
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="e-input" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="e-input" placeholder="Enter your password" required />
                </div>
                <div id="error-placeholder"></div>
                <button type="submit" class="e-btn e-primary login-btn">Sign In</button>
            </form>
        </div>
        <div class="login-footer"><span id="year"></span></div>
    </div>
    <script>
        document.getElementById('year').textContent = '\u00A9 ' + new Date().getFullYear() + ' SMIS. All rights reserved.';
        var params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            document.getElementById('error-placeholder').innerHTML =
                '<div class="error-message">Invalid email or password.</div>';
        }
    </script>
</body>
</html>
