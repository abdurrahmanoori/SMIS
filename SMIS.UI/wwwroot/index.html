<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SMIS.UI</title>
    <base href="/" />
    <link href="https://cdn.syncfusion.com/blazor/27.1.48/styles/bootstrap5.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://cdn.syncfusion.com/blazor/27.1.48/syncfusion-blazor.min.js" type="text/javascript"></script>
    <script>
        window.setupResizeListener = function(dotnetHelper) {
            window.mainLayoutRef = dotnetHelper;
            window.addEventListener('resize', function() {
                if (window.innerWidth <= 768 && window.mainLayoutRef) {
                    window.mainLayoutRef.invokeMethodAsync('CloseSidebarFromJS');
                }
            });
        };
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
